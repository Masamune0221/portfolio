<svg width="100%" height="100%" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg"
  preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- グラデーションの定義 -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#E11D48" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="grad3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="grad4" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#EF4444" stop-opacity="0.1" />
    </linearGradient>

    <!-- アニメーションの設定 -->
    <style>
      .capsule {
      transform-origin: center;
      mix-blend-mode: hard-light;
      }
      .c1 { fill: url(#grad1); animation: float1 12s infinite alternate ease-in-out; }
      .c2 { fill: url(#grad2); animation: float2 15s infinite alternate-reverse ease-in-out; }
      .c3 { fill: url(#grad3); animation: float3 10s infinite alternate ease-in-out; }
      .c4 { fill: url(#grad4); animation: float2 14s infinite alternate ease-in-out; }
      .c5 { fill: url(#grad2); animation: float1 11s infinite alternate-reverse ease-in-out; }
      .c6 { fill: url(#grad3); animation: float3 13s infinite alternate ease-in-out; }
      .c7 { fill: url(#grad1); animation: float1 16s infinite alternate ease-in-out; }

      /* ふわふわ斜めに動くアニメーション */
      @keyframes float1 {
      0% { transform: translateY(0) translateX(0); }
      100% { transform: translateY(-10px) translateX(10px); }
      }
      @keyframes float2 {
      0% { transform: translateY(0) translateX(0); }
      100% { transform: translateY(15px) translateX(-10px); }
      }
      @keyframes float3 {
      0% { transform: translateY(0) translateX(0); }
      100% { transform: translateY(-10px) translateX(-15px); }
      }
    </style>
  </defs>

  <!-- 全体を斜めに傾ける -->
  <g transform="rotate(-40, 600, 400)">
    <!-- 
      細長く(widthを小さく、heightを大きく)しつつ、
      「重なり」を維持するために数を少し増やし、x座標を密集させました。
      全体的に左側に寄せて配置しています。
    -->
    <rect class="capsule c1" x="350" y="0" width="60" height="500" rx="30" />
    <rect class="capsule c2" x="380" y="0" width="80" height="550" rx="40" />
    <rect class="capsule c3" x="420" y="-200" width="50" height="600" rx="25" />
    <rect class="capsule c4" x="450" y="-300" width="90" height="800" rx="45" />
    <rect class="capsule c5" x="490" y="-450" width="70" height="500" rx="35" />
    <rect class="capsule c6" x="520" y="-550" width="100" height="240" rx="50" />
    <rect class="capsule c7" x="580" y="-300" width="60" height="600" rx="30" />

    <!-- 追加で数本、少しずらして密集させる -->
    <rect class="capsule c2" x="320" y="-100" width="100" height="500" rx="45" />
    <rect class="capsule c1" x="600" y="0" width="70" height="700" rx="35" />
    <rect class="capsule c3" x="630" y="-200" width="50" height="300" rx="25" />
    <rect class="capsule c4" x="660" y="-50" width="80" height="500" rx="40" />
  </g>
</svg>